version: "3.9"

# Production docker-compose
# Usage: docker compose up -d

services:
  # --- Data Layer ---
  postgres:
    image: postgres:16-alpine
    container_name: aivideo-postgres
    environment:
      POSTGRES_DB: ai_video_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aivideo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Application Layer ---
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aivideo-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ai_video_platform
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      REQUIRE_AUTH: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: aivideo-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ai_video_platform
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    # For GPU workers, add:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: aivideo-web
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  outputs_data:
