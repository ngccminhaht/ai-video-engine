# ============================================================
# AI Video Platform — Full Stack Docker Compose
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up -d --build  # Rebuild and start
#   docker compose logs -f api    # Follow API logs
#   docker compose down           # Stop all
#
# Services:
#   - api:      FastAPI backend (port 8000)
#   - worker:   arq job worker (processes video generation)
#   - web:      Next.js frontend (port 3000)
#   - redis:    Job queue + cache
#   - postgres: Production database
# ============================================================

services:
  # --- Infrastructure ---

  postgres:
    image: postgres:16-alpine
    container_name: aivideo-postgres
    environment:
      POSTGRES_DB: ai_video_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aivideo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend API ---

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aivideo-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_video_platform
      REDIS_URL: redis://redis:6379/0
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DEBUG: "false"
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
      - models_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/seed_models.py &&
        python -m uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --- Worker (Job Processor) ---

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aivideo-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_video_platform
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
      - models_data:/app/models
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "-m", "arq", "apps.worker.WorkerSettings"]
    restart: unless-stopped

  # --- Frontend ---

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_USE_MOCK_API: "false"
    container_name: aivideo-web
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  outputs_data:
  models_data:
